#   [tool] static code analysis (linting)
lint
    eslint --config etc/eslint.mjs src/*.ts

#   [tool] static code analysis (linting) with file watching
lint-watch
    nodemon --exec "npm start lint" --watch src --ext ts

#   [tool] code compilation/transpiling (building) with file watching
build-watch
    nodemon --exec "npm start build" --watch src --ext ts

#   [tool] build entire project
build : lint build-cmd build-plugin

#   [tool] build command program
build-cmd
    tsc --project etc/tsc.json

#   [tool] copy plugin directory into package for bundling
build-plugin
    shx rm -rf plugin && \
    shx mkdir -p plugin && \
    shx cp -r ../plugin/. plugin/
    shx rm -rf .claude-plugin && \
    shx mkdir -p .claude-plugin && \
    shx cp -r ../.claude-plugin/. .claude-plugin/

#   [tool] remove regularly built files
clean
    shx rm -rf dst plugin

#   [tool] remove all built files
distclean: clean
    shx rm -f package-lock.json
    shx rm -rf node_modules

